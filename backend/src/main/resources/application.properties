spring.application.name=backend
#encryption.secret=${ENCRYPTION_SECRET:68PSkgdEw7rWU+bvGi/BVOhR9NiId8rgawn5iCw+TSU=}
encryption.secret=MySuperSecretKey
encryption.secret-key=MySuperSecretKey

spring.datasource.url=jdbc:mysql://localhost:3306/smartmaildb?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=smartmail_user
spring.datasource.password=smartmail_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Multipart Upload Limits ---
# Default is 1MB which causes silent failures for any real image.
# Raised to 10MB to match typical marketing image sizes.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Static Resource: serve uploaded images at /uploads/** ---
spring.web.resources.static-locations=classpath:/static/,file:uploads/

#intellij apis
groq.api.key=${GROQ_API_KEY}
resend.api.key=${RESEND_API_KEY}
