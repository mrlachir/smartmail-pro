services:
  mysql:
    image: mysql:8.0
    container_name: smartmail-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartmaildb
      MYSQL_USER: smartmail_user
      MYSQL_PASSWORD: smartmail_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: